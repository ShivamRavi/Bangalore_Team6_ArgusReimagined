<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argus Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="flex min-h-screen">
      <aside id="sidebar" class="hidden w-72 flex-col border-r border-slate-200 bg-white p-6 lg:flex">
        <div>
          <p class="text-sm font-semibold uppercase tracking-[0.3em] text-cyan-600">Argus</p>
          <h1 class="mt-2 text-xl font-semibold">Learning Hub</h1>
        </div>
        <nav class="mt-8 space-y-2 text-sm">
          <a class="block rounded-xl bg-cyan-50 px-4 py-3 font-medium text-cyan-700" href="#">Overview</a>
          <a class="block rounded-xl px-4 py-3 text-slate-600 hover:bg-slate-100" href="#">Courses</a>
          <a class="block rounded-xl px-4 py-3 text-slate-600 hover:bg-slate-100" href="#">Activities</a>
          <a class="block rounded-xl px-4 py-3 text-slate-600 hover:bg-slate-100" href="#">Performance</a>
        </nav>
        <div class="mt-auto rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <p id="sidebar-username" class="font-semibold">User</p>
          <p id="sidebar-house" class="mt-1 text-sm text-slate-500">House</p>
        </div>
      </aside>
      <main class="flex-1 p-6 md:p-10">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm font-medium uppercase tracking-[0.3em] text-cyan-600">Dashboard</p>
            <h2 class="mt-2 text-3xl font-semibold">Welcome back</h2>
          </div>
          <div class="flex items-center gap-2">
            <button id="sidebar-toggle" class="rounded-xl border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-200 lg:hidden">Menu</button>
            <button id="logout-btn" class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-medium hover:bg-slate-200">Log out</button>
          </div>
        </div>
        <div class="mt-8 grid gap-6 xl:grid-cols-[1.3fr_0.7fr]">
          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-slate-500">Current balance</p>
                <p id="euros-balance" class="mt-2 text-4xl font-semibold">0</p>
              </div>
              <div class="rounded-2xl bg-cyan-50 px-4 py-3 text-sm font-medium text-cyan-700" id="planet-chip">Mercury</div>
            </div>
            <div class="mt-6 grid gap-4 md:grid-cols-3">
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-sm text-slate-500">Current streak</p>
                <p id="streak-value" class="mt-2 text-2xl font-semibold">0</p>
              </div>
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-sm text-slate-500">Lifetime euros</p>
                <p id="lifetime-euros" class="mt-2 text-2xl font-semibold">0</p>
              </div>
              <div class="rounded-2xl bg-slate-50 p-4">
                <p class="text-sm text-slate-500">Section</p>
                <p id="section-value" class="mt-2 text-2xl font-semibold">—</p>
              </div>
            </div>
          </section>
          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
            <h3 class="text-lg font-semibold">Quick actions</h3>
            <button id="complete-worksheet" class="mt-4 w-full rounded-xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white hover:bg-slate-700">Complete worksheet</button>
            <button id="refresh-search" class="mt-3 w-full rounded-xl border border-slate-300 px-4 py-3 text-sm font-semibold hover:bg-slate-100">Refresh search</button>
          </section>
        </div>
        <section class="mt-8 rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
          <div class="flex items-center justify-between">
            <div>
              <h3 class="text-lg font-semibold">Recommended learning</h3>
              <p class="text-sm text-slate-500">Search results from the local Argus search service.</p>
            </div>
          </div>
          <div id="search-results" class="mt-6 grid gap-4 md:grid-cols-2"></div>
        </section>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
