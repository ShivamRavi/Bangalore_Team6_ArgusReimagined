<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argus LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="flex min-h-screen items-center justify-center px-4">
      <div class="w-full max-w-5xl overflow-hidden rounded-3xl border border-slate-800 bg-slate-900 shadow-2xl">
        <div class="grid lg:grid-cols-[1.1fr_0.9fr]">
          <div class="bg-gradient-to-br from-cyan-500/20 via-slate-900 to-purple-500/20 p-10">
            <p class="mb-4 text-sm uppercase tracking-[0.35em] text-cyan-300">Argus Learning</p>
            <h1 class="text-4xl font-semibold leading-tight">Learn, earn, and grow through every activity.</h1>
            <p class="mt-4 max-w-md text-sm text-slate-300">
              Sign in to continue your streak, track your rewards, and keep your house progressing.
            </p>
          </div>
          <div class="p-10">
            <h2 class="text-2xl font-semibold">Welcome back</h2>
            <p class="mt-2 text-sm text-slate-400">Use your Argus account to enter the dashboard.</p>
            <form id="login-form" class="mt-8 space-y-4">
              <input id="username" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 outline-none focus:border-cyan-400" placeholder="Username" required />
              <input id="password" type="password" class="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 outline-none focus:border-cyan-400" placeholder="Password" required />
              <button class="w-full rounded-xl bg-cyan-500 px-4 py-3 font-semibold text-slate-950 transition hover:bg-cyan-400">Sign in</button>
            </form>
            <p id="form-message" class="mt-4 text-sm text-slate-400"></p>
          </div>
        </div>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
