<style>
        /* Minimal custom styles for animations if needed */
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

<body class="bg-background min-h-screen flex items-center justify-center relative overflow-hidden text-on-surface">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed/30 blur-[100px] z-0 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-fixed/30 blur-[120px] z-0 pointer-events-none"></div>
<div class="absolute top-[20%] right-[10%] w-[30vw] h-[30vw] rounded-full bg-tertiary-fixed/20 blur-[80px] z-0 pointer-events-none"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-margin-sm md:px-0">
<!-- Glassmorphic Login Card -->
<div class="glass-panel border border-surface-white/50 rounded-[1.5rem] shadow-[0_8px_32px_rgba(22,0,65,0.08)] p-container-padding md:p-margin-lg">
<!-- Header / Brand -->
<div class="flex flex-col items-center mb-8 text-center">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center mb-4 shadow-md">
<span class="material-symbols-outlined text-surface-white text-3xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2">Argus LMS</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Discover Yourself</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-white border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface placeholder-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="student@argus.edu" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex items-center justify-between ml-1">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="password">Password</label>
<a class="font-body-sm text-body-sm text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-white border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface placeholder-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full flex items-center justify-center gap-2 py-3.5 px-4 bg-streak-flame text-on-error rounded-lg font-headline-md text-headline-md text-[16px] hover:shadow-lg hover:-translate-y-0.5 transition-all active:scale-[0.98]" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-6">
<div class="h-px bg-outline-variant/50 flex-1"></div>
<span class="font-label-caps text-label-caps text-outline">OR</span>
<div class="h-px bg-outline-variant/50 flex-1"></div>
</div>
<!-- Secondary Action -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface-white border border-outline-variant rounded-lg font-body-lg text-body-lg font-semibold text-on-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]" type="button">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRLw6x8METYfV8CSKTFRDSKJVM6jKSWKQrymyH3cZrGjbQzd9-NdMOK21A1wmaiJxkTwWzC-ki-_5110-xmJF4Ak3lMfSmP8FUP0uilv34pzCXQEB6D3rnocM3-ovJNZDoNjs0R7JIGQrSMyJAseEPpPMu5stKo2G4krJ-W90nUOF-7j8oXrqkmDbk6J0_ufcyOVHk_QD2WZLMXILA5ZW4JssChCJTWNV6X-UW5FeT41GFyHOg2NiaPA">
                Sign up with Google
            </button>
<!-- Footer Note -->
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? <a class="text-secondary font-bold hover:text-primary transition-colors" href="#">Contact Academy</a>
</p>
</div>
</div>
</main>
