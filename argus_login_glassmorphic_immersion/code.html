                        "primary": "#160041",
                        "mars-red": "#EF5350"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    "spacing": {

</head>
<body class="bg-background text-on-surface min-h-screen font-body-lg antialiased overflow-hidden">
<main class="w-full min-h-screen relative flex items-center justify-center p-4">
<!-- Full-Bleed Background with Blur Overlay -->
<div class="absolute inset-0 z-0">
<img alt="Background Space" class="w-full h-full object-cover object-center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD2BPhN5bPSeUk9-QKHgPrKvWlSHZeo-g6bbn25gHnuTpH04CxV92KXalsav2QhSpyg3vW-si7q5cUpiOzQqaFKReq0JawJ1dCH35z6g3z_d28HYt4B0chequ2j38pDD1Zg84RYeAapzHb3dX_oDYSJfEFkLsm_o72-iVKP0Vhz8DnvVb4fkmtSWDxKxj33bSrou2K8zHHXSzr9AaLKyKhY0OvnsP97zuIRkdfwRP00rFg_gZqElN7WHcyZN-twoZDVk5c"/>
<div class="absolute inset-0 bg-primary/20 backdrop-blur-xl"></div>
</div>
<!-- Glassmorphic Login Card -->
<div class="relative z-10 w-full max-w-[480px] bg-surface-white/60 backdrop-blur-2xl border border-white/40 shadow-[0_8px_32px_rgba(0,0,0,0.15)] rounded-2xl overflow-hidden flex flex-col">
<!-- Role Selection Tabs -->
<div class="flex border-b border-white/30 bg-surface-white/40">
<button class="flex-1 py-4 text-center font-headline-md text-[16px] border-b-2 border-primary text-primary bg-white/30 transition-colors focus:outline-none" type="button">
                    Student
                </button>
<button class="flex-1 py-4 text-center font-headline-md text-[16px] border-b-2 border-transparent text-on-surface-variant hover:bg-white/20 transition-colors focus:outline-none" type="button">
                    Staff
                </button>
<button class="flex-1 py-4 text-center font-headline-md text-[16px] border-b-2 border-transparent text-on-surface-variant hover:bg-white/20 transition-colors focus:outline-none" type="button">
                    Parent
                </button>
</div>
<div class="p-8 flex flex-col justify-center">
<!-- Brand / Header -->
<div class="flex flex-col items-center mb-8 text-center">
<div class="w-20 h-20 bg-surface-white rounded-xl flex items-center justify-center mb-4 shadow-sm border border-white/50 p-2">
<img alt="Argus Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCEf_JFKH1fDST67-3sMpx8aagCuVErh7BjQmC5dJSyyeFTGEAruyM7l9KjvrBpPA8IYlAI7w2CClub1cHQ1iPuudqVwuV-eBAAieeS95aAOmx6xB0O_KH-aC8Ipzgv9P_ZnBjoBzusk9_H4riLirkoooIqGxCZTHCnmshIrLxOULo434e49DY5KDxQWM37L8u5M-ViklKYSibr8LuI5e0S-Rp0n-MLLh_FOG0Dr01v3TpZ5MfS14MjCarPYjqJz9wrh1Y"/>
</div>
<h2 class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-1">Argus LMS</h2>
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Welcome Back</h1>
<p class="font-body-sm text-on-surface-variant">Please sign in to access your portal.</p>
</div>
<!-- Login Form -->
<form class="space-y-5">
<!-- Identifier Input -->
<div class="space-y-1.5">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="identifier">Enrollment Number / Phone Number / User ID <span class="text-error">*</span></label>
<div class="relative">
<input class="w-full bg-surface-white/50 border border-white/60 text-on-surface rounded-lg px-4 py-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-lg placeholder:text-outline-variant/80 backdrop-blur-sm shadow-sm" id="identifier" placeholder="e.g. 2122ES111265" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password <span class="text-error">*</span></label>
<a class="font-body-sm text-secondary hover:text-primary transition-colors focus:outline-none focus:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-white/50 border border-white/60 text-on-surface rounded-lg px-4 py-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-lg placeholder:text-outline-variant/80 backdrop-blur-sm shadow-sm" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-4 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="toggleIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Buttons -->
<div class="pt-4 space-y-4">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline-md text-[16px] py-3.5 rounded-lg shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                            Proceed
                            <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/40"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-body-sm text-sm">Or</span>
<div class="flex-grow border-t border-outline-variant/40"></div>
</div>
<button class="w-full bg-surface-white/40 border border-primary text-primary hover:bg-white/60 font-headline-md text-[16px] py-3.5 rounded-lg transition-all active:scale-[0.98] flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 shadow-sm backdrop-blur-sm" type="button">
                            Login Using OTP
                        </button>
</div>
</form>
</div>
</div>
<!-- Footer -->
<footer class="absolute bottom-6 left-0 right-0 flex flex-col items-center gap-2 z-10">
<div class="flex items-center gap-2 text-surface-white/80 font-body-sm backdrop-blur-sm bg-black/20 px-4 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[18px]">chat</span>
<a class="hover:text-surface-white transition-colors focus:outline-none focus:underline" href="mailto:help@lighthouse-learning.com">help@lighthouse-learning.com</a>
</div>
<div class="flex items-center gap-4 font-body-sm text-surface-white/60 text-sm backdrop-blur-sm bg-black/20 px-4 py-1 rounded-full">
<a class="hover:text-surface-white transition-colors focus:outline-none focus:underline" href="#">Privacy</a>
<span class="w-px h-3 bg-surface-white/30"></span>
<a class="hover:text-surface-white transition-colors focus:outline-none focus:underline" href="#">Terms</a>
</div>
</footer>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
