<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Argus LMS - Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@800&amp;family=Nunito+Sans:wght@400;800;900&amp;display=swap" rel="stylesheet">
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "streak-flame": "#FF5722",
                        "secondary": "#4f54b4",
                        "secondary-fixed": "#e1e0ff",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#9680ce",
                        "tertiary": "#240800",
                        "on-background": "#1d1b20",
                        "on-primary-fixed": "#220655",
                        "background": "#fdf7ff",
                        "on-primary-fixed-variant": "#4e3a82",
                        "tertiary-container": "#461700",
                        "on-secondary-fixed": "#03006d",
                        "surface-dim": "#ded8df",
                        "surface-white": "#FFFFFF",
                        "surface-container-low": "#f8f2f9",
                        "on-secondary-fixed-variant": "#363b9a",
                        "surface-container-high": "#ece6ed",
                        "on-error": "#ffffff",
                        "exp-gold": "#F9A825",
                        "secondary-container": "#949aff",
                        "on-surface": "#1d1b20",
                        "surface-container-highest": "#e6e1e8",
                        "on-tertiary-container": "#c47b58",
                        "tertiary-fixed-dim": "#ffb695",
                        "inverse-primary": "#cfbcff",
                        "on-error-container": "#93000a",
                        "neptune-indigo": "#3F51B5",
                        "primary-fixed-dim": "#cfbcff",
                        "on-secondary-container": "#282c8c",
                        "primary-container": "#2c155f",
                        "primary": "#160041",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#494550",
                        "inverse-on-surface": "#f5eff6",
                        "inverse-surface": "#322f35",
                        "surface-bright": "#fdf7ff",
                        "surface-tint": "#66529c",
                        "mars-red": "#EF5350",
                        "secondary-fixed-dim": "#bfc1ff",
                        "outline-variant": "#cac4d1",
                        "jupiter-tan": "#BCAAA4",
                        "venus-sulfur": "#FFF176",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#fdf7ff",
                        "surface-container": "#f2ecf3",
                        "on-tertiary-fixed-variant": "#70371a",
                        "primary-fixed": "#e9ddff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "outline": "#7a7581",
                        "on-tertiary-fixed": "#351000",
                        "surface-variant": "#e6e1e8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "margin-lg": "40px",
                        "container-padding": "24px",
                        "base": "8px",
                        "margin-md": "24px",
                        "margin-sm": "12px"
                    },
                    "fontFamily": {
                        "label-caps": ["Hanken Grotesk"],
                        "headline-md": ["Nunito Sans"],
                        "headline-lg-mobile": ["Nunito Sans"],
                        "headline-lg": ["Nunito Sans"],
                        "stat-exp": ["Nunito Sans"],
                        "body-sm": ["Nunito Sans"],
                        "body-lg": ["Nunito Sans"]
                    },
                    "fontSize": {
                        "label-caps": ["12px", { "lineHeight": "1.0", "letterSpacing": "0.08em", "fontWeight": "800" }],
                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "800" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "1.2", "fontWeight": "900" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "900" }],
                        "stat-exp": ["18px", { "lineHeight": "1.0", "fontWeight": "900" }],
                        "body-sm": ["14px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col items-center justify-center p-4 font-body-lg text-on-surface antialiased relative">
<!-- Decorative background elements for structural/academic feel -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container opacity-[0.03] blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] rounded-full bg-secondary opacity-[0.03] blur-3xl"></div>
<!-- Grid overlay -->
<div class="absolute inset-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px]"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-[420px] relative z-10">
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.04)] border border-outline-variant/30 flex flex-col items-center w-full">
<!-- Brand / Logo Area -->
<div class="mb-8 flex flex-col items-center">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center mb-4 shadow-sm rotate-3 transform transition-transform hover:rotate-0 duration-300">
<span class="material-symbols-outlined text-4xl text-on-primary" style="font-variation-settings: 'FILL' 1;">assured_workload</span>
</div>
<h2 class="font-label-caps text-label-caps text-secondary tracking-widest uppercase mb-1">Argus LMS</h2>
<h1 class="font-headline-lg text-headline-lg text-primary text-center">Welcome Back</h1>
</div>
<!-- Login Form -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-xl">mail</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg pl-10 pr-4 py-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-lg placeholder:text-outline-variant" id="email" placeholder="student@argus.edu" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-body-sm text-secondary hover:text-primary transition-colors focus:outline-none focus:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface rounded-lg pl-10 pr-10 py-3 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-lg placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-xl" id="toggleIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-tertiary hover:bg-tertiary-container text-on-tertiary font-headline-md text-headline-md py-3.5 rounded-lg shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4 focus:outline-none focus:ring-2 focus:ring-tertiary focus:ring-offset-2 focus:ring-offset-surface-container-lowest" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Links -->
<footer class="mt-8 text-center flex flex-col items-center gap-2">
<div class="flex items-center gap-3 font-body-sm text-on-surface-variant">
<a class="hover:text-primary transition-colors focus:outline-none focus:underline" href="#">Terms of Service</a>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<a class="hover:text-primary transition-colors focus:outline-none focus:underline" href="#">Privacy Policy</a>
</div>
<p class="font-body-sm text-outline text-xs mt-2">© 2024 Argus Systems Inc.</p>
</footer>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility_off';
            }
        }
    </script>
</body></html>
